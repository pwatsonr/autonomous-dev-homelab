version: 1
vault:
  address: https://vault.pwatson.space:8200
  auth_method: approle
  approle:
    role_id_env: VAULT_ROLE_ID
    secret_id_env: VAULT_SECRET_ID
hosts:
  - hostname: gallifrey-lab-01
    platform: docker-swarm-manager
    role: manager
    mcp_endpoint: https://mcp.gallifrey-lab-01.pwatson.space
    ssh_fallback:
      host: gallifrey-lab-01
      port: 22
      user: patrick
      key_ref:
        vault_path: kv/data/homelab/ssh
        vault_field: gallifrey_01_key
  - hostname: gallifrey-lab-02
    platform: docker-swarm-worker
    role: worker
    ssh_fallback:
      host: gallifrey-lab-02
      port: 22
      user: patrick
      key_ref:
        vault_path: kv/data/homelab/ssh
        vault_field: gallifrey_02_key
  - hostname: unraid.pwatson.space
    platform: unraid
    role: nas
    ssh_fallback:
      host: unraid.pwatson.space
      port: 22
      user: root
      key_ref:
        vault_path: kv/data/homelab/ssh
        vault_field: unraid_key
